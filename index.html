<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FBFAF8">
<title>Wayne's to-do</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wayne's to-do">
<style>
  :root{
    --bg:#FBFAF8; --row:#FBFAF8; --divider:#EEECE7;
    --ink:#20211F; --sec:#9A9A95; --muted:#A8A6A0;
    --accent:#2E6FE0; --accent-soft:#E9F1FC;
    --hi:#E5564B; --med:#E0A52E; --lo:#C2BFB7;
    --done:#34A853; --done-soft:#E7F4EA;
    --sheet:#FFFFFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding-bottom:96px;}
  .wrap{max-width:520px; margin:0 auto; min-height:100vh; position:relative;}

  header{padding:max(22px,env(safe-area-inset-top)) 20px 8px;}
  .eyebrow{font-size:13px; color:var(--muted); font-weight:500;}
  .titlerow{display:flex; align-items:flex-end; justify-content:space-between; margin-top:2px;}
  h1{font-size:30px; font-weight:600; letter-spacing:-0.4px; margin:0;}
  .counts{font-size:13px; color:var(--muted); padding-bottom:6px;}

  .toggle{margin-top:15px; display:inline-flex; background:#EFEDE8; border-radius:9px; padding:3px;}
  .toggle button{border:0; background:transparent; font:inherit; font-size:13px; color:var(--sec);
    padding:6px 18px; border-radius:7px; cursor:pointer;}
  .toggle button.on{background:#fff; border:0.5px solid #E4E1DB; color:var(--ink); font-weight:500;}

  .group{font-size:13px; font-weight:500; color:var(--muted); padding:16px 20px 4px;}
  .group.done-h{display:flex; align-items:center; gap:6px; cursor:pointer;}
  .group.done-h .chev{transition:transform .18s ease;}
  .group.done-h.open .chev{transform:rotate(0deg);}
  .group.done-h:not(.open) .chev{transform:rotate(-90deg);}

  .rowwrap{position:relative; overflow:hidden; border-top:0.5px solid var(--divider);}
  .act-left{position:absolute; top:0; left:0; bottom:0; display:flex;}
  .act-right{position:absolute; top:0; right:0; bottom:0; display:flex;}
  .act-left button,.act-right button{border:0; color:#fff; font:inherit; font-size:11px; font-weight:500;
    width:84px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer;}
  .a-prog{background:var(--accent);}
  .a-done{background:var(--done);}
  .a-del{background:#C8584F;}
  .a-del.confirm{background:#8E241D;}
  .act-left i,.act-right i{font-style:normal;}

  .row{position:relative; background:var(--row); display:flex; align-items:flex-start; gap:13px;
    padding:11px 20px; touch-action:pan-y; transition:transform .22s cubic-bezier(.22,.61,.36,1);}
  .circle{width:22px; height:22px; border-radius:50%; flex-shrink:0; margin-top:2px; cursor:pointer;
    border:2px solid #D6D3CC; display:flex; align-items:center; justify-content:center;}
  .circle.inprog{border-color:var(--accent);}
  .circle.inprog .dot{width:9px; height:9px; border-radius:50%; background:var(--accent);}
  .circle.done{border:0; background:var(--done); color:#fff;}
  .body{flex:1; min-width:0; cursor:pointer;}
  .task{font-size:15.5px; line-height:1.35;}
  .row.is-done .task{color:#B7B5AE; text-decoration:line-through;}
  .meta{display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap;}
  .pill{font-size:11px; font-weight:500; color:var(--accent); background:var(--accent-soft); padding:2px 8px; border-radius:5px;}
  .chip{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--sec);}
  .chip.od{color:var(--hi);}
  .pdot{width:7px; height:7px; border-radius:50%;}
  .pdot.High{background:var(--hi);} .pdot.Med{background:var(--med);} .pdot.Low{background:var(--lo);}

  .fab{position:fixed; right:max(18px,env(safe-area-inset-right)); bottom:max(22px,env(safe-area-inset-bottom));
    width:56px; height:56px; border-radius:50%; border:0; background:var(--accent); color:#fff;
    font-size:30px; line-height:1; cursor:pointer; box-shadow:0 3px 10px rgba(46,111,224,.4);}

  .scrim{position:fixed; inset:0; background:rgba(20,20,18,.35); opacity:0; pointer-events:none; transition:opacity .2s; z-index:20;}
  .scrim.show{opacity:1; pointer-events:auto;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:21; background:var(--sheet);
    border-radius:18px 18px 0 0; padding:18px 20px max(22px,env(safe-area-inset-bottom)); max-width:520px; margin:0 auto;
    transform:translateY(110%); transition:transform .26s cubic-bezier(.22,.61,.36,1);}
  .sheet.show{transform:translateY(0);}
  .sheet h2{font-size:17px; font-weight:600; margin:2px 0 14px;}
  .sheet label{display:block; font-size:12px; color:var(--sec); margin:12px 0 5px;}
  .sheet input[type=text], .sheet input[type=date], .sheet input[type=time], .sheet textarea{width:100%; font:inherit; font-size:15px; color:var(--ink);
    border:0.5px solid #DDDAD3; border-radius:10px; padding:11px 12px; background:#fff; resize:none;}
  .times{display:flex; gap:10px;}
  .times > div{flex:1;}
  .netout{margin-top:14px; font-size:15px; color:var(--ink); font-weight:600;}
  .netout span{color:var(--accent);}
  .netout.bad span{color:var(--hi);}
  .clk{width:22px; height:22px; flex-shrink:0; margin-top:1px; color:var(--sec); display:flex; align-items:center; justify-content:center;}
  .hh{font-size:15.5px; font-weight:600; color:var(--accent); white-space:nowrap; padding-left:10px;}
  .group.week{display:flex; align-items:baseline; justify-content:space-between; padding-right:20px;}
  .group.week .wtot{color:var(--ink); font-weight:600; font-size:14px;}
  .seg{display:flex; gap:8px; flex-wrap:wrap;}
  .seg button{border:0.5px solid #DDDAD3; background:#fff; font:inherit; font-size:13px; color:var(--sec);
    padding:8px 14px; border-radius:9px; cursor:pointer;}
  .seg button.on{border-color:var(--accent); color:var(--accent); background:var(--accent-soft); font-weight:500;}
  .sheet .primary{width:100%; margin-top:18px; border:0; background:var(--accent); color:#fff; font:inherit;
    font-size:15px; font-weight:500; padding:13px; border-radius:11px; cursor:pointer;}
  .sheet .danger{width:100%; margin-top:10px; border:0; background:transparent; color:#C8584F; font:inherit;
    font-size:14px; padding:10px; cursor:pointer;}
  .hint{font-size:12px; color:var(--muted); margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Lodge</div>
    <div class="titlerow"><h1 id="title">Wayne's to-do</h1><div class="counts" id="counts"></div></div>
    <div class="toggle" id="pageswitch">
      <button id="p-tasks" class="on">To-do</button>
      <button id="p-hours">Hours</button>
    </div>
    <div class="toggle" id="viewtoggle">
      <button id="t-prio" class="on">Priority</button>
      <button id="t-area">Area</button>
      <button id="t-deadline">Deadline</button>
    </div>
  </header>
  <main id="list"></main>
</div>

<button class="fab" id="fab" aria-label="Add task">+</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
// ---------- bridge config ----------
// BRIDGE_URL is filled in once the Apps Script bridge is deployed. While it is empty the
// app runs on local demo data, so it works before the backend exists.
const CONFIG = { BRIDGE_URL: "https://script.google.com/macros/s/AKfycbym-yhDIHUJRkupD4ateHDgqnN9PNYWYlr3p0RlH-kUa8K48s_heoBrJC_ungIt2Z4x/exec" };
// The capability TOKEN is NOT stored in this (public) page. It arrives in the worker's link
// as #t=... on first open, is cached to localStorage, then stripped from the address bar.
let TOKEN = localStorage.getItem("lodge-token") || "";
// ACTOR identifies who is using THIS device (Wayne, Neil, ...). It arrives in the link as
// &u=Name alongside the token, is cached, and stamps every change this device makes.
let ACTOR = localStorage.getItem("lodge-actor") || "Wayne";
(() => {
  const h = new URLSearchParams(location.hash.slice(1));
  let changed = false;
  if (h.get("t")) { TOKEN = h.get("t"); localStorage.setItem("lodge-token", TOKEN); changed = true; }
  if (h.get("u")) { ACTOR = h.get("u"); localStorage.setItem("lodge-actor", ACTOR); changed = true; }
  if (changed) history.replaceState(null, "", location.pathname + location.search);
})();
const REMOTE = () => !!CONFIG.BRIDGE_URL;
const CONNECTED = () => !REMOTE() || !!TOKEN;
function api(body) {
  return fetch(CONFIG.BRIDGE_URL, { method: "POST", body: JSON.stringify({ token: TOKEN, ...body }) }).then(r => r.json());
}

// ---------- local cache + seed (offline fallback / pre-deploy demo) ----------
const KEY = "lodge-todo-v1";
const SEED = [
  {id:1, task:"Run MVHR duct to bedroom 2 terminal", area:"MVHR", status:"In progress", priority:"High", added_by:"Neil/AI", notes:"", photo:"", deadline:"2026-07-03"},
  {id:2, task:"Seal AVCL penetration at plant room", area:"MVHR", status:"Open", priority:"Med", added_by:"Neil/AI", notes:"", photo:"x"},
  {id:3, task:"Order more duct clips - running short", area:"MVHR", status:"Open", priority:"Low", added_by:"Wayne", notes:"", photo:""},
  {id:4, task:"Torque-check goal-post base bolts", area:"Foundations", status:"Open", priority:"High", added_by:"Neil/AI", notes:"", photo:"", deadline:"2026-06-28"},
  {id:5, task:"Confirm CLT delivery slot with Schilliger", area:"CLT", status:"Done", priority:"Med", added_by:"Neil/AI", notes:"", photo:""},
  {id:6, task:"Photo of column baseplates for Neil", area:"Foundations", status:"Done", priority:"Low", added_by:"Wayne", notes:"", photo:""}
];
const Data = {
  all(){ try{ return JSON.parse(localStorage.getItem(KEY)) || structuredClone(SEED); }catch(e){ return structuredClone(SEED); } },
  save(t){ localStorage.setItem(KEY, JSON.stringify(t)); },
  nextId(t){ return t.reduce((m,x)=>Math.max(m,x.id||0),0)+1; }
};

// ---------- hours: cache + seed (offline fallback / pre-deploy demo) ----------
const HKEY = "lodge-hours-v1";
const HOURS_SEED = [
  {id:1, date:"2026-06-29", start:"08:00", finish:"16:30", break_min:30, hours:8,    note:"",            added_by:"Wayne", status:"Logged"},
  {id:2, date:"2026-06-30", start:"07:45", finish:"16:00", break_min:30, hours:7.75, note:"Foundations", added_by:"Wayne", status:"Logged"}
];
const HData = {
  all(){ try{ return JSON.parse(localStorage.getItem(HKEY)) || structuredClone(HOURS_SEED); }catch(e){ return structuredClone(HOURS_SEED); } },
  save(t){ localStorage.setItem(HKEY, JSON.stringify(t)); },
  nextId(t){ return t.reduce((m,x)=>Math.max(m,x.id||0),0)+1; }
};

// ---------- state ----------
let tasks = Data.all();
let hours = HData.all();
let page = "tasks";        // "tasks" | "hours"
let view = "priority";
let doneOpen = false;
let removedOpen = false;
let hoursRemovedOpen = false;
const PRI = {High:0, Med:1, Low:2};
const ACTIVE = s => s==="Open" || s==="In progress";
const DL_ORDER = {"Overdue":0,"Today":1,"This week":2,"Later":3,"No date":4};
function dlDays(t){ if(!t.deadline) return null; const d=new Date(t.deadline+"T00:00:00"), td=new Date(); td.setHours(0,0,0,0); return Math.round((d-td)/86400000); }
function bucket(t){ const n=dlDays(t); if(n===null) return "No date"; if(n<0) return "Overdue"; if(n===0) return "Today"; if(n<=7) return "This week"; return "Later"; }
function fmtDate(s){ if(!s) return ""; return new Date(s+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function areas(){ return [...new Set(tasks.map(t=>t.area).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }

// ---------- hours helpers ----------
const HLOGGED = h => h.status!=="Removed";
function hmToMin(s){ if(!s) return null; const [h,m]=String(s).split(":").map(Number); return h*60+(m||0); }
function netHours(start, finish, brk){ const a=hmToMin(start), b=hmToMin(finish); if(a==null||b==null) return null; const n=(b-a)-(Number(brk)||0); return n/60; }
function fmtHours(h){ if(h==null||isNaN(h)) return "—"; return (Math.round(h*100)/100).toString()+" h"; }
function fmtDay(s){ if(!s) return ""; return new Date(s+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); }
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function mondayOf(s){ const d=new Date(s+"T00:00:00"); if(isNaN(d)) return null; const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return ymd(d); }
function weekLabel(monday){ return "Week of "+new Date(monday+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function sumHours(list){ return list.reduce((s,h)=>s+(Number(h.hours)||0),0); }
function thisWeekTotal(){ const m=mondayOf(ymd(new Date())); return sumHours(hours.filter(h=>HLOGGED(h)&&!!h.date&&mondayOf(h.date)===m)); }
// Guard: if a Sheet date/time cell got coerced to a Date type, normalise back to plain strings.
function normHour(h){
  if(h.date!=null) h.date = String(h.date).slice(0,10);
  ["start","finish"].forEach(k=>{ if(h[k]!=null){ const m=String(h[k]).match(/(\d{2}:\d{2})/); if(m) h[k]=m[1]; } });
  return h;
}

// ---------- render ----------
const $ = s => document.querySelector(s);
const list = $("#list");

function persist(){ Data.save(tasks); }
function save(t){ persist(); if(REMOTE() && t){ api({action:"upsert", task:t, who:ACTOR}).catch(e=>console.warn("sync failed", e)); } }
function saveHours(h){ HData.save(hours); if(REMOTE() && h){ api({action:"upsert", task:h, who:ACTOR, tab:"Hours"}).catch(e=>console.warn("sync failed", e)); } }
async function uploadPhoto(t, file){
  const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  if(!REMOTE()) return dataUrl;                              // local preview only, pre-deploy
  const r = await api({action:"photo", taskId:t.id, dataUrl, filename:"photo-"+t.id+".jpg"});
  if(!r.ok) throw new Error(r.error||"upload failed");
  return r.url;
}

function render(){
  $("#title").textContent = page==="hours" ? "Wayne's hours" : "Wayne's to-do";
  $("#p-tasks").classList.toggle("on", page==="tasks");
  $("#p-hours").classList.toggle("on", page==="hours");
  $("#viewtoggle").style.display = page==="tasks" ? "" : "none";
  if(!CONNECTED()){
    $("#counts").textContent = "";
    document.querySelector(".fab").style.display = "none";
    list.innerHTML = `<div style="padding:64px 30px; text-align:center;">
      <div style="font-size:17px; font-weight:600; color:#20211F; margin-bottom:8px;">Not connected</div>
      <div style="font-size:14px; line-height:1.55; color:#8A8A85;">Open your personal invite link to connect to the live list.<br>Ask Neil for it.</div>
    </div>`;
    return;
  }
  const fab = document.querySelector(".fab");
  fab.style.display = "";
  fab.setAttribute("aria-label", page==="hours" ? "Log hours" : "Add task");
  if(page==="hours"){ renderHours(); return; }
  renderTasks();
}

function renderTasks(){
  const open = tasks.filter(t=>ACTIVE(t.status)).length;
  const done = tasks.filter(t=>t.status==="Done").length;
  $("#counts").textContent = `${open} open · ${done} done`;
  $("#t-prio").classList.toggle("on", view==="priority");
  $("#t-area").classList.toggle("on", view==="area");
  $("#t-deadline").classList.toggle("on", view==="deadline");

  const active = tasks.filter(t=>ACTIVE(t.status));
  const groups = {};
  for(const t of active){
    const k = view==="area" ? (t.area||"Other") : view==="deadline" ? bucket(t) : t.priority;
    (groups[k] = groups[k] || []).push(t);
  }
  let keys = Object.keys(groups);
  keys.sort(
    view==="priority" ? (a,b)=>PRI[a]-PRI[b]
    : view==="deadline" ? (a,b)=>DL_ORDER[a]-DL_ORDER[b]
    : (a,b)=>a.localeCompare(b)
  );

  const dnum = t => { const n=dlDays(t); return n===null ? 1e9 : n; };
  let html = "";
  for(const k of keys){
    const items = groups[k].sort((a,b)=>{
      const ap=(a.status==="In progress")?0:1, bp=(b.status==="In progress")?0:1;
      return ap-bp || dnum(a)-dnum(b) || PRI[a.priority]-PRI[b.priority];
    });
    html += `<div class="group">${esc(k)}</div>` + items.map(rowHTML).join("");
  }

  const doneTasks = tasks.filter(t=>t.status==="Done");
  if(doneTasks.length){
    html += `<div class="group done-h ${doneOpen?'open':''}" id="doneh">
      <span class="chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></span>
      Done · ${doneTasks.length}</div>`;
    if(doneOpen) html += doneTasks.map(rowHTML).join("");
  }

  const removedTasks = tasks.filter(t=>t.status==="Removed");
  if(removedTasks.length){
    html += `<div class="group done-h ${removedOpen?'open':''}" id="removedh">
      <span class="chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></span>
      Deleted · ${removedTasks.length}</div>`;
    if(removedOpen) html += removedTasks.map(rowHTML).join("");
  }
  list.innerHTML = html;
}

function renderHours(){
  $("#counts").textContent = `${fmtHours(thisWeekTotal())} this week`;
  const logged = hours.filter(h=>HLOGGED(h) && mondayOf(h.date)).slice()
    .sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (hmToMin(b.start)||0)-(hmToMin(a.start)||0));
  let html = "";
  if(!logged.length){
    html += `<div style="padding:48px 30px; text-align:center; color:#9A9A95; font-size:14px; line-height:1.55;">No hours logged yet.<br>Tap ＋ to add a shift.</div>`;
  }
  const groups = {};
  for(const h of logged){ const k=mondayOf(h.date); (groups[k]=groups[k]||[]).push(h); }
  const weeks = Object.keys(groups).sort((a,b)=> b.localeCompare(a));
  for(const wk of weeks){
    html += `<div class="group week">${weekLabel(wk)}<span class="wtot">${fmtHours(sumHours(groups[wk]))}</span></div>`
      + groups[wk].map(hoursRowHTML).join("");
  }
  const removed = hours.filter(h=>h.status==="Removed");
  if(removed.length){
    html += `<div class="group done-h ${hoursRemovedOpen?'open':''}" id="hremovedh">
      <span class="chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></span>
      Deleted · ${removed.length}</div>`;
    if(hoursRemovedOpen) html += removed.map(hoursRowHTML).join("");
  }
  list.innerHTML = html;
}

function hoursRowHTML(h){
  const removed = h.status==="Removed";
  const brk = Number(h.break_min)||0;
  let meta = `${esc(h.start||"")}–${esc(h.finish||"")}`;
  if(brk) meta += ` · break ${brk}m`;
  if(h.note) meta += ` · ${esc(h.note)}`;
  if(h.added_by && h.added_by!=="Claude" && h.added_by!=="Neil/AI") meta += ` · ${esc(h.added_by)}`;
  return `<div class="rowwrap" data-id="${h.id}">
    <div class="row ${removed?'is-done':''}" data-act="hedit" data-id="${h.id}">
      <div class="clk">${ico('clock')}</div>
      <div class="body">
        <div class="task">${fmtDay(h.date)}</div>
        <div class="meta"><span class="chip">${meta}</span></div>
      </div>
      <div class="hh">${fmtHours(h.hours)}</div>
    </div>
  </div>`;
}

function rowHTML(t){
  const done = t.status==="Done";
  const removed = t.status==="Removed";
  const inactive = done || removed;
  const circle = done
    ? `<div class="circle done" data-act="toggle" data-id="${t.id}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg></div>`
    : removed
    ? `<div class="circle" data-act="toggle" data-id="${t.id}" style="opacity:.45"></div>`
    : (t.status==="In progress"
        ? `<div class="circle inprog" data-act="toggle" data-id="${t.id}"><span class="dot"></span></div>`
        : `<div class="circle" data-act="toggle" data-id="${t.id}"></div>`);
  let meta = "";
  if(!inactive){
    if(t.status==="In progress") meta += `<span class="pill">In progress</span>`;
    meta += `<span class="chip"><span class="pdot ${t.priority}"></span>${t.priority}</span>`;
    if(t.deadline) meta += `<span class="chip${dlDays(t)<0?' od':''}">${ico('cal')} ${fmtDate(t.deadline)}</span>`;
    if(t.photo) meta += `<span class="chip">${ico('photo')}1</span>`;
    if(t.added_by && t.added_by!=="Claude" && t.added_by!=="Neil/AI") meta += `<span class="chip">${ico('user')}Added by ${esc(t.added_by)}</span>`;
    if(t.notes) meta += `<span class="chip">${ico('note')}</span>`;
  }
  const acts = inactive ? '' : `<div class="act-left"><button class="a-del" data-act="del" data-id="${t.id}"><i>${ico('trash')}</i><span class="albl">Delete</span></button></div>
    <div class="act-right"><button class="a-prog" data-act="prog" data-id="${t.id}"><i>${ico('clock')}</i>In progress</button><button class="a-done" data-act="done" data-id="${t.id}"><i>${ico('check')}</i>Done</button></div>`;
  return `<div class="rowwrap" data-id="${t.id}">${acts}
    <div class="row ${inactive?'is-done':''}" data-id="${t.id}">
      ${circle}
      <div class="body" data-act="edit" data-id="${t.id}">
        <div class="task">${esc(t.task)}</div>
        ${meta?`<div class="meta">${meta}</div>`:''}
      </div>
    </div>
  </div>`;
}

function ico(n){
  const p = {
    photo:'<circle cx="12" cy="13" r="3.2"/><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"/>',
    user:'<circle cx="12" cy="8" r="3.4"/><path d="M5.5 19a6.5 6.5 0 0113 0"/>',
    note:'<path d="M5 4h14v16H5z"/><path d="M8 9h8M8 13h6"/>',
    check:'<path d="M5 12l5 5L20 7"/>',
    trash:'<path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/>',
    cal:'<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>',
    clock:'<circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/>'
  }[n];
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}
const esc = s => (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---------- interactions ----------
function find(id){ return tasks.find(t=>t.id==id); }
function findHour(id){ return hours.find(h=>h.id==id); }

list.addEventListener("click", e=>{
  if(e.target.closest("#doneh")){ doneOpen=!doneOpen; render(); return; }
  if(e.target.closest("#removedh")){ removedOpen=!removedOpen; render(); return; }
  if(e.target.closest("#hremovedh")){ hoursRemovedOpen=!hoursRemovedOpen; render(); return; }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const id = el.dataset.id, act = el.dataset.act;
  if(act==="toggle"){ const t=find(id); t.status = (t.status==="Done"||t.status==="Removed") ? "Open" : "Done"; stamp(t,"done"); save(t); render(); }
  else if(act==="done"){ const t=find(id); t.status="Done"; stamp(t,"done"); save(t); render(); }
  else if(act==="prog"){ const t=find(id); t.status="In progress"; stamp(t,"edit"); save(t); render(); }
  else if(act==="del"){
    if(el.dataset.confirm){ const t=find(id); t.status="Removed"; stamp(t,"edit"); save(t); render(); }
    else { el.dataset.confirm="1"; el.classList.add("confirm"); const lbl=el.querySelector(".albl"); if(lbl) lbl.textContent="Confirm?"; }
  }
  else if(act==="edit"){ openEdit(id); }
  else if(act==="hedit"){ openHoursEdit(id); }
});

$("#t-area").onclick = ()=>{ view="area"; render(); };
$("#t-prio").onclick = ()=>{ view="priority"; render(); };
$("#t-deadline").onclick = ()=>{ view="deadline"; render(); };
$("#p-tasks").onclick = ()=>{ page="tasks"; render(); };
$("#p-hours").onclick = ()=>{ page="hours"; render(); };

// swipe to reveal — left reveals In progress/Done (right panel), right reveals Delete (left panel)
let sw = null;
list.addEventListener("pointerdown", e=>{
  const row = e.target.closest(".row"); if(!row || e.target.closest(".circle")) return;
  const wrap = row.closest(".rowwrap");
  if(!wrap || !wrap.querySelector(".act-left, .act-right")) return;   // inactive rows don't slide
  sw = {row, x:e.clientX, cur: parseFloat(row.dataset.x||"0"), dx:0};
});
list.addEventListener("pointermove", e=>{
  if(!sw) return;
  let dx = e.clientX - sw.x + sw.cur;
  dx = Math.max(-168, Math.min(84, dx));
  sw.dx = dx; sw.row.style.transition="none"; sw.row.style.transform=`translateX(${dx}px)`;
});
list.addEventListener("pointerup", e=>{
  if(!sw) return;
  let target = 0;
  if(sw.dx < -56) target = -168;
  else if(sw.dx > 42) target = 84;
  sw.row.style.transition=""; sw.row.style.transform=`translateX(${target}px)`; sw.row.dataset.x = target;
  sw = null;
});

// ---------- bottom sheets ----------
const scrim = $("#scrim"), sheet = $("#sheet");
function closeSheet(){ scrim.classList.remove("show"); sheet.classList.remove("show"); }
scrim.onclick = closeSheet;

const PRIOS = ["High","Med","Low"];
const STAT  = ["Open","In progress","Done"];
const BREAKS = ["None","15","30","45","60"];
function todayStr(){ return ymd(new Date()); }

function segGroup(opts, cur, name){
  return `<div class="seg" data-seg="${name}">` +
    opts.map(o=>`<button data-val="${esc(o)}" class="${o===cur?'on':''}">${esc(o)}</button>`).join("") + `</div>`;
}
function areaSeg(cur){
  const opts = areas();
  if(cur && !opts.includes(cur)) opts.unshift(cur);
  return `<div class="seg" data-seg="area">` +
    opts.map(o=>`<button data-val="${esc(o)}" class="${o===cur?'on':''}">${esc(o)}</button>`).join("") +
    `<button data-newarea type="button">+ New</button></div>`;
}

function openEdit(id){
  const t = find(id);
  const draft = {status:t.status, priority:t.priority, area:t.area};
  sheet.innerHTML = `
    <h2>Edit task</h2>
    <label>Task</label>
    <textarea id="f-task" rows="2">${esc(t.task)}</textarea>
    <label>Status</label>${segGroup(STAT, t.status, "status")}
    <label>Priority</label>${segGroup(PRIOS, t.priority, "priority")}
    <label>Deadline</label>
    <input type="date" id="f-deadline" value="${t.deadline||''}">
    <label>Area</label>${areaSeg(t.area)}
    <label>Notes</label>
    <textarea id="f-notes" rows="2" placeholder="Add a note">${esc(t.notes)}</textarea>
    <label>Photo</label>
    <input type="file" id="f-photo" accept="image/*" capture="environment">
    <div class="hint">Uploads go to your Drive once wired up.</div>
    <button class="primary" id="f-save">Save</button>
    <button class="danger" id="f-del">Delete (kept in sheet for Neil)</button>`;
  wireSeg(draft);
  $("#f-save").onclick = async ()=>{
    t.task = $("#f-task").value.trim() || t.task;
    t.notes = $("#f-notes").value.trim();
    t.deadline = $("#f-deadline").value || "";
    t.status = draft.status; t.priority = draft.priority; t.area = draft.area;
    const f = $("#f-photo").files[0];
    if(f){ try{ t.photo = await uploadPhoto(t, f); }catch(err){ console.warn(err); } }
    stamp(t,"edit"); save(t); render(); closeSheet();
  };
  $("#f-del").onclick = ()=>{ t.status="Removed"; stamp(t,"edit"); save(t); render(); closeSheet(); };
  show();
}

function openAdd(){
  if(!CONNECTED()) return;
  const draft = {status:"Open", priority:"Med", area:(areas()[0]||"Site")};
  sheet.innerHTML = `
    <h2>New task</h2>
    <label>Task</label>
    <textarea id="f-task" rows="2" placeholder="What needs doing?"></textarea>
    <label>Priority</label>${segGroup(PRIOS, draft.priority, "priority")}
    <label>Deadline</label>
    <input type="date" id="f-deadline" value="">
    <label>Area</label>${areaSeg(draft.area)}
    <button class="primary" id="f-add">Add task</button>`;
  wireSeg(draft);
  $("#f-add").onclick = ()=>{
    const text = $("#f-task").value.trim(); if(!text) return;
    const t = {id:Data.nextId(tasks), task:text, area:draft.area, status:"Open",
      priority:draft.priority, added_by:ACTOR, notes:"", photo:"", deadline:$("#f-deadline").value||""};
    stamp(t,"create"); tasks.push(t); save(t); render(); closeSheet();
  };
  show();
}

function wireSeg(draft){
  sheet.querySelectorAll("[data-seg]").forEach(g=>{
    g.querySelectorAll("button[data-val]").forEach(b=>{
      b.onclick = ()=>{
        g.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
        b.classList.add("on");
        draft[g.dataset.seg] = b.dataset.val;
      };
    });
  });
  const nb = sheet.querySelector("[data-newarea]");
  if(nb) nb.onclick = ()=>{
    const name=(prompt("New area")||"").trim(); if(!name) return;
    draft.area = name;
    const seg = sheet.querySelector('[data-seg="area"]');
    if(seg){ seg.outerHTML = areaSeg(name); wireSeg(draft); }
  };
}
// ---------- hours entry sheets ----------
function breakSeg(cur){
  return `<div class="seg" data-seg="break">` +
    BREAKS.map(o=>`<button data-val="${o}" class="${o===cur?'on':''}">${o==="None"?o:o+"m"}</button>`).join("") + `</div>`;
}
function wireHours(draft){
  const upd = ()=>{
    const s=$("#h-start").value, f=$("#h-finish").value;
    const brk = draft.break==="None" ? 0 : Number(draft.break);
    const net = netHours(s, f, brk);
    const el = $("#h-net");
    if(s===""||f===""){ el.classList.remove("bad"); el.innerHTML="= <span>— h</span>"; return; }
    if(net==null||net<=0){ el.classList.add("bad"); el.innerHTML="= <span>finish after start</span>"; return; }
    el.classList.remove("bad"); el.innerHTML="= <span>"+fmtHours(net)+"</span>";
  };
  const seg = sheet.querySelector('[data-seg="break"]');
  seg.querySelectorAll("button[data-val]").forEach(b=>{
    b.onclick = ()=>{ seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); draft.break=b.dataset.val; upd(); };
  });
  const st=$("#h-start"), fi=$("#h-finish");
  st.onchange = ()=>{ upd(); if(fi.value===""){ try{ fi.showPicker(); }catch(e){ fi.focus(); } } };
  fi.onchange = upd;
  upd();
}
function readHours(draft){
  const date=$("#h-date").value, start=$("#h-start").value, finish=$("#h-finish").value;
  const brk = draft.break==="None" ? 0 : Number(draft.break);
  const net = netHours(start, finish, brk);
  if(!date || start==="" || finish==="" || net==null || net<=0){
    const el=$("#h-net"); el.classList.add("bad"); el.innerHTML="= <span>check date, start &amp; finish</span>"; return null;
  }
  return { date, start, finish, break_min:brk, hours:Math.round(net*100)/100, note:$("#h-note").value.trim() };
}
function openHoursAdd(){
  if(!CONNECTED()) return;
  const draft = {break:"30"};
  sheet.innerHTML = `
    <h2>Log hours</h2>
    <label>Date</label>
    <input type="date" id="h-date" value="${todayStr()}">
    <div class="times">
      <div><label>Start</label><input type="time" id="h-start" step="900"></div>
      <div><label>Finish</label><input type="time" id="h-finish" step="900"></div>
    </div>
    <label>Break</label>${breakSeg(draft.break)}
    <div class="netout" id="h-net">= <span>— h</span></div>
    <label>Note</label>
    <textarea id="h-note" rows="2" placeholder="What was done (optional)"></textarea>
    <button class="primary" id="h-add">Log hours</button>`;
  wireHours(draft);
  $("#h-add").onclick = ()=>{
    const v = readHours(draft); if(!v) return;
    const h = {id:HData.nextId(hours), ...v, added_by:ACTOR, status:"Logged"};
    stamp(h,"create"); hours.push(h); saveHours(h); render(); closeSheet();
  };
  show();
}
function openHoursEdit(id){
  const h = findHour(id);
  const draft = {break: (Number(h.break_min)||0)===0 ? "None" : String(h.break_min)};
  const removed = h.status==="Removed";
  sheet.innerHTML = `
    <h2>Edit hours</h2>
    <label>Date</label>
    <input type="date" id="h-date" value="${h.date||''}">
    <div class="times">
      <div><label>Start</label><input type="time" id="h-start" step="900" value="${h.start||''}"></div>
      <div><label>Finish</label><input type="time" id="h-finish" step="900" value="${h.finish||''}"></div>
    </div>
    <label>Break</label>${breakSeg(draft.break)}
    <div class="netout" id="h-net">= <span>— h</span></div>
    <label>Note</label>
    <textarea id="h-note" rows="2" placeholder="What was done (optional)">${esc(h.note||'')}</textarea>
    <button class="primary" id="h-save">Save</button>
    <button class="danger" id="h-del">${removed ? "Restore this entry" : "Delete (kept in sheet for Neil)"}</button>`;
  wireHours(draft);
  $("#h-save").onclick = ()=>{
    const v = readHours(draft); if(!v) return;
    Object.assign(h, v); stamp(h,"edit"); saveHours(h); render(); closeSheet();
  };
  $("#h-del").onclick = ()=>{ h.status = removed ? "Logged" : "Removed"; stamp(h,"edit"); saveHours(h); render(); closeSheet(); };
  show();
}

function show(){ scrim.classList.add("show"); sheet.classList.add("show"); }

$("#fab").onclick = ()=> page==="hours" ? openHoursAdd() : openAdd();

function stamp(t, kind){
  const now = new Date().toISOString().slice(0,10);
  if(kind==="create"){ t.created = now; }
  if(kind==="done"){ if(t.status==="Done"){ t.done_by=ACTOR; t.done_at=now; } }
  t.last_edited_by=ACTOR; t.last_edited=now;
}

render();
(async function init(){
  if(REMOTE() && TOKEN){
    try{
      const [rt, rh] = await Promise.all([ api({action:"list"}), api({action:"list", tab:"Hours"}) ]);
      if(rt.ok){ tasks = rt.tasks; Data.save(tasks); } else { console.warn("bridge tasks:", rt.error); }
      if(rh.ok){ hours = rh.tasks.map(normHour).filter(h=>h && h.date); HData.save(hours); } else { console.warn("bridge hours:", rh.error); }
    }
    catch(e){ console.warn("bridge load failed, using local cache", e); }
    render();
  }
})();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
